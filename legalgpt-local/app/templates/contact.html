<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LegalGPT | Get Started</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at 12% 14%, #fbf8f1 0%, #f4efe6 40%, #e8dece 100%);
        color: #172235;
        font-family: "Cormorant Garamond", "Times New Roman", serif;
      }
    </style>
  </head>
  <body class="min-h-screen text-[#172235]">
    <main class="mx-auto max-w-4xl px-6 md:px-10 py-16 md:py-24">
      <a href="/" class="text-xl md:text-2xl uppercase tracking-[0.14em]">LegalGPT</a>

      <section class="mt-10 border-y border-[#172235]/20 py-10 md:py-14">
        <p class="uppercase tracking-[0.12em] text-base md:text-lg text-[#263143]/80">Get Started</p>
        <h1 class="mt-3 text-5xl md:text-7xl leading-[0.95]">Request Access</h1>
        <p class="mt-4 text-2xl md:text-3xl max-w-3xl text-[#263143]/90">
          Share your details and our admin team will review and issue credentials for approved service users.
        </p>

        <form id="accessRequestForm" class="mt-8 space-y-4 max-w-2xl">
          <input
            name="full_name"
            placeholder="Full Name"
            class="w-full rounded-xl border border-[#172235]/25 bg-[#f9f5ec] px-4 py-3 text-2xl"
            required
          />
          <input
            name="email"
            type="email"
            placeholder="Work Email"
            class="w-full rounded-xl border border-[#172235]/25 bg-[#f9f5ec] px-4 py-3 text-2xl"
            required
          />
          <input
            name="organization"
            placeholder="Organization"
            class="w-full rounded-xl border border-[#172235]/25 bg-[#f9f5ec] px-4 py-3 text-2xl"
          />
          <textarea
            name="use_case"
            rows="4"
            placeholder="Briefly describe your legal workflow needs"
            class="w-full rounded-xl border border-[#172235]/25 bg-[#f9f5ec] px-4 py-3 text-2xl resize-none"
          ></textarea>

          <button
            class="inline-flex items-center justify-center rounded-full bg-[#172235] px-8 py-3 text-2xl text-[#f4efe6] hover:bg-[#263143] transition-colors"
          >
            Submit Request
          </button>
        </form>

        <p id="accessRequestMsg" class="mt-4 text-lg"></p>

        <p class="mt-10 text-xl md:text-2xl text-[#263143]/90">
          Already Have an Account?
          <a href="/login" class="underline underline-offset-4">Login here</a>
        </p>
      </section>
    </main>

    <script>
      window.addEventListener("pageshow", async () => {
        try {
          const res = await fetch("/api/auth/session", { method: "GET" });
          if (!res.ok) return;
          const data = await res.json();
          if (data.authenticated) {
            window.location.href = data.force_password_change ? "/password-change" : "/dashboard";
          }
        } catch (_) {
          // Keep page usable if network fails.
        }
      });
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
