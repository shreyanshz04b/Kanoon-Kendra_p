{% extends 'base.html' %}
{% block auth_mode %}protected{% endblock %}
{% block body %}
<div class="max-w-md mx-auto pt-24 px-4">
  <h1 class="text-3xl font-semibold mb-2">Change Password</h1>
  <p class="text-slate-600 mb-6">Update your password anytime to keep your account secure.</p>

  <form id="passwordChangeForm" class="space-y-3 bg-white p-5 rounded-xl shadow-sm border border-slate-200">
    <input name="current_password" type="password" placeholder="Current Password" class="w-full border border-slate-300 rounded-lg px-3 py-2" required />
    <input name="new_password" type="password" placeholder="New Password (min 10 chars)" class="w-full border border-slate-300 rounded-lg px-3 py-2" required />
    <button class="w-full bg-slate-900 text-white py-2 rounded-lg">Update Password</button>
  </form>

  <p id="passwordChangeMsg" class="mt-3 text-sm"></p>
</div>
{% endblock %}
