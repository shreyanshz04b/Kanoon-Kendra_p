{% extends 'base.html' %}
{% block auth_mode %}public-only{% endblock %}
{% block body %}
<div class="max-w-md mx-auto pt-24 px-4">
  <h1 class="text-3xl font-semibold mb-2">Reset Password</h1>
  <p class="text-slate-600 mb-6">Set a new password using the reset link sent to your email.</p>

  <form id="resetPasswordForm" class="space-y-3 bg-white p-5 rounded-xl shadow-sm border border-slate-200">
    <input name="token" id="resetTokenInput" placeholder="Reset Token" class="w-full border border-slate-300 rounded-lg px-3 py-2" required />
    <input name="new_password" type="password" placeholder="New Password (min 10 chars)" class="w-full border border-slate-300 rounded-lg px-3 py-2" required />
    <button class="w-full bg-slate-900 text-white py-2 rounded-lg">Update Password</button>
  </form>

  <p id="resetPasswordMsg" class="mt-3 text-sm"></p>
  <p class="mt-3 text-sm text-slate-600">Back to <a class="underline" href="/login">login</a>.</p>
</div>
{% endblock %}
