{% extends 'base.html' %}
{% block auth_mode %}public-only{% endblock %}
{% block body %}
<div class="max-w-md mx-auto pt-24 px-4">
  <h1 class="text-3xl font-semibold mb-2">Forgot Password</h1>
  <p class="text-slate-600 mb-6">Enter your username to generate a new temporary password immediately.</p>

  <form id="forgotPasswordForm" class="space-y-3 bg-white p-5 rounded-xl shadow-sm border border-slate-200">
    <input name="username_or_email" placeholder="Username" class="w-full border border-slate-300 rounded-lg px-3 py-2" required />
    <button class="w-full bg-slate-900 text-white py-2 rounded-lg">Generate Temporary Password</button>
  </form>

  <p id="forgotPasswordMsg" class="mt-3 text-sm"></p>
  <pre id="forgotPasswordCredentialBox" class="mt-3 bg-slate-50 p-4 rounded-xl border border-slate-200 text-sm overflow-auto"></pre>
  <p class="mt-3 text-sm text-slate-600">Back to <a class="underline" href="/login">login</a>.</p>
</div>
{% endblock %}
